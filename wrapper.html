<head>

  <!-- =======================================================================
       ACTION NETWORK PAGE WRAPPER — self-contained, generated by a tool
       =======================================================================

       >>> TO CHANGE THE BRANDING, YOU DON'T NEED TO EDIT THIS CODE. <<<
       Go to the free Solidarity Studio tool, change colours / fonts / logo /
       layout with simple controls, and copy the result back into Action Network:

           https://www.solidaritystudio.uk/tools/action-network-wrapper

       To edit an EXISTING wrapper: open the tool, click "Import Saved Wrapper",
       choose the wrapper.html you saved, make your changes, then use "Copy Header"
       / "Copy Footer" (or "Save Wrapper" to keep a fresh copy for next time).

       -----------------------------------------------------------------------
       HOW IT'S INSTALLED IN ACTION NETWORK
       Paste this whole file into an AN page-wrapper template (Start Organizing →
       your group → Page wrappers). AN injects the action widget at the
       "<!-- END TEMPLATE HEADER - START WIDGET -->" marker, so everything before
       it goes in the Header field and everything after in the Footer field — the
       tool's Copy Header / Copy Footer buttons split it for you. All styles are
       inline in the <style id="anw-embed-css"> block below — no external CSS to
       upload or cache-bust. The only asset you upload is the logo image. The
       widget embed must use  ?format=js&style=full&css=whitelabel  so AN ships
       only a minimal structural base; the styles below paint on top.

       -----------------------------------------------------------------------
       ADVANCED (editing by hand) — search for the word  CONFIG :
         1. CONFIG: COLOURS+FONTS — edit the tokens at the top of the <style>
                                    block (Section 0), and the font <link>.
         2. CONFIG: LOGO          — set the logo <img> src + alt + home link.
         3. CONFIG: MODULES       — toggle optional behaviours (window.ANW).
         4. CONFIG: LAYOUT        — pick the .gen_wrapper layout-- class.
       Note: if you edit this file by hand, the hosted tool won't reflect your
       change until its baked-in copy is refreshed (see README → "Re-baking").
       ======================================================================= -->

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

  <!-- CONFIG: LOGO — favicon (optional) -->
  <link rel="icon" href="https://example.org/favicon.ico" />

  <!-- Preconnect to origins we'll need — saves a round-trip on first request -->
  <link rel="preconnect" href="https://actionnetwork.org">
  <link rel="preconnect" href="https://can2-prod.s3.amazonaws.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- CONFIG: FONTS — loaded async (media=print swap) so it doesn't block render.
       Request only the weights you use. Keep family in sync with --font-* tokens. -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700&display=swap"></noscript>

  <!-- =======================================================================
       BRAND STYLES (inline). Edit Section 0 tokens to re-theme.
       ======================================================================= -->
  <style id="anw-embed-css" type="text/css">

  /* 0. THEME TOKENS — CONFIG: COLOURS+FONTS. The only part you normally edit. */
  .an-homepage-embed {
    /* FONTS — must match the font <link> above */
    --font-body:        "Libre Franklin", Arial, sans-serif;
    --font-heading:     "Libre Franklin", Arial, sans-serif;
    --heading-weight:   700;
    --heading-transform: none;          /* uppercase | none */
    --button-transform: uppercase;      /* button text only */

    /* COLOURS */
    --brand:            #0e7a43;
    --brand-hover:      #0a5c33;
    --link:             #0e7a43;
    --text:             #000000;
    --heading:          #000000;
    --required:         #0a5c33;

    --page-bg:          #f4f4f6;
    --header-bg:        #ffffff;
    --footer-bg:        #111111;
    --footer-text:      rgba(255,255,255,.85);

    --card-bg:          #ffffff;
    --card-border:      rgba(197,202,187,.20);
    --card-shadow:      0 30px 60px -15px rgba(35,47,74,.08);

    --statement-bg:     #f3f3f7;
    --statement-bar:    #000000;

    --input-bg:         #ffffff;
    --input-border:     #000000;
    --input-focus:      #0e7a43;
    --placeholder:      #6b7280;
    --divider:          rgba(187,202,190,.30);

    --skeleton:         #ebebeb;
    --hover-opacity:    .85;

    /* SHAPE / SIZING */
    --card-radius:      8px;
    --statement-radius: 2px;
    --button-radius:    2px;
    --input-radius:     0;
    --input-height:     50px;
    --wrapper-max:      1200px;

    /* LOGO sizing */
    --logo-max-height:  40px;
    --logo-max-width:   180px;
  }

  /* 1. BASE */
  .an-homepage-embed {
    font-family: var(--font-body);
    color: var(--text);
    background-color: var(--page-bg);
  }
  body.gen_body.an-homepage-embed { margin: 0; color: var(--heading); }
  body.an-homepage-embed:not(.gen_body) { background-color: var(--card-bg) !important; margin: 0; }

  .an-homepage-embed h1,
  .an-homepage-embed h2,
  .an-homepage-embed h3,
  .an-homepage-embed h4,
  .an-homepage-embed h5,
  .an-homepage-embed #can_embed_form h2,
  .an-homepage-embed #donate_auto_modal h2,
  .an-homepage-embed #donate_make_recurring_modal h2 {
    font-family: var(--font-heading);
    font-weight: var(--heading-weight);
    text-transform: var(--heading-transform);
    color: var(--heading);
  }
  .an-homepage-embed #can_embed_form,
  .an-homepage-embed #donate_auto_modal,
  .an-homepage-embed #donate_make_recurring_modal { line-height: 24px; }

  /* 2. HEADER — CONFIG: LOGO sizing via tokens */
  .an-homepage-embed #gen_header {
    padding: 4px 0;
    background-color: var(--header-bg);
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .an-homepage-embed #gen_header .gen_wrapper {
    padding-top: 8px; padding-bottom: 8px;
    display: flex; align-items: center;
  }
  .an-homepage-embed #gen_header img {
    max-height: var(--logo-max-height);
    max-width: var(--logo-max-width);
    width: auto; height: auto;
  }
  .an-homepage-embed .gen_name { margin: 0; color: var(--heading); }

  /* 3. PAGE WRAPPER */
  .an-homepage-embed .gen_wrapper {
    padding: 48px 24px;
    width: var(--wrapper-max);
    max-width: 100%;
    margin: auto;
    box-sizing: border-box;
  }

  /* 4. COLUMNS — description plain, form on a white card */
  .an-homepage-embed .gen_wrapper #can_embed_form > .clearfix #can_main_col,
  .an-homepage-embed .can_embed #can_embed_form > .clearfix #can_main_col {
    background: transparent; padding: 0; box-sizing: border-box;
  }
  .an-homepage-embed .gen_wrapper #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .can_embed #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper .survey_int,
  .an-homepage-embed .gen_wrapper #can_embed_form.can_thank_you_wrap,
  .an-homepage-embed .can_embed #can_embed_form.can_thank_you_wrap {
    background-color: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: 33px;
    box-sizing: border-box;
  }
  .an-homepage-embed .gen_wrapper [id^="can-fundraising-area"] {
    background-color: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }

  /* 4b. FUNDRAISER sidebar-hide [MODULE — enable via ANW.hideFundraiserSidebar].
     Needs the iframe injector: it adds .an-hide-sidebar to the iframe <body>. */
  .an-homepage-embed.can_fundraising_widget.an-hide-sidebar #can_sidebar { display: none !important; }
  .an-homepage-embed.can_fundraising_widget.an-hide-sidebar #can_main_col { width: 100% !important; }

  /* 4c. IFRAME CONTEXT — inset the form inside the donation / event widget.
     No outer card there (iframe <body> has .an-homepage-embed but NOT .gen_body),
     so without this the form runs flush to the iframe edges. Pad #can_embed_form
     itself (not its inner .clearfix): the fundraiser nests .clearfix directly,
     but ticketed events nest it one level deeper (#can_embed_form > div >
     .clearfix), so a > .clearfix rule misses them. #can_embed_form is the
     outermost wrapper in both, so padding it covers all sides in both layouts. */
  .an-homepage-embed:not(.gen_body) #can_embed_form {
    padding: 24px; box-sizing: border-box;
  }

  /* 5. QUOTE BOX (blockquote/q) + plain sidebar form heading.
     The grey box is for actual quotes only — the "Sign This Petition" heading
     (#can_sidebar .action_sidebar h4) must stay a plain heading. */
  .an-homepage-embed #can_embed_form blockquote,
  .an-homepage-embed #can_embed_form q {
    background: var(--statement-bg);
    border-left: 4px solid var(--statement-bar);
    border-radius: var(--statement-radius);
    padding: 16px 16px 16px 20px;
    margin: 0 0 24px;
    text-transform: none !important;
    font-weight: 400;
    line-height: 24px;
  }
  .an-homepage-embed #can_embed_form blockquote::before,
  .an-homepage-embed #can_embed_form q::before { display: none !important; }
  .an-homepage-embed #can_embed_form #can_sidebar .action_sidebar > h4,
  .an-homepage-embed #can_embed_form #can_sidebar > h4 {
    background: none; border: 0; border-radius: 0; padding: 0;
    margin: 0 0 16px; font-size: 22px; line-height: 1.2; text-transform: none;
  }
  /* Kill whitelabel's decorative 1px underline bar under the heading. */
  .an-homepage-embed #can_embed_form #can_sidebar .action_sidebar > h4::after,
  .an-homepage-embed #can_embed_form #can_sidebar > h4::after { display: none !important; }

  /* 6. ENTRY TITLE */
  .an-homepage-embed #can_embed_form h2.entry-title,
  .an-homepage-embed #can_embed_form h1.entry-title {
    font-size: 32px;
    line-height: 1.15;
    margin-bottom: 16px !important;
    border-bottom: none !important;
    padding-bottom: 0 !important;
    color: var(--brand);
  }
  .an-homepage-embed #can_embed_form .main_action_image { margin-bottom: 16px !important; }

  /* 7. HIDE "SPONSORED BY" / "PETITION BY" [MODULE — on by default via the
     an-hide-sponsor body class; ANW.hideSponsoredBy:false removes the class].
     Incl. the thank-you variant (#can_thank_you #action_info .action_info_user
     has no .action_owner_box). */
  .an-homepage-embed.an-hide-sponsor #action_info_inner,
  .an-homepage-embed.an-hide-sponsor .action_owner_box,
  .an-homepage-embed.an-hide-sponsor .sponsor_owner_box,
  .an-homepage-embed.an-hide-sponsor #can_thank_you #action_info { display: none !important; }

  /* 8. FORM FIELDS */
  .an-homepage-embed #can_embed_form label {
    font-weight: 700; color: var(--heading);
    font-size: 16px; line-height: 24px; margin-bottom: 4px; display: inline-block;
  }
  .an-homepage-embed #can_embed_form label .required,
  .an-homepage-embed #can_embed_form .required { color: var(--required); }

  .an-homepage-embed #can_embed_form input[type="text"],
  .an-homepage-embed #can_embed_form input[type="password"],
  .an-homepage-embed #can_embed_form input[type="url"],
  .an-homepage-embed #can_embed_form input[type="email"],
  .an-homepage-embed #can_embed_form input[type="tel"],
  .an-homepage-embed #can_embed_form input[type="number"],
  .an-homepage-embed #can_embed_form select.can_select,
  .an-homepage-embed #can_embed_form span.can_select {
    height: var(--input-height);
    line-height: normal;
    border: 1px solid var(--input-border);
    background-color: var(--input-bg);
    border-radius: var(--input-radius);
    padding: 0 13px;
    box-sizing: border-box;
  }
  /* span.can_select shows the selected value as text — needs an explicit
     line-height to vertically centre it (e.g. country picker "United Kingdom"). */
  .an-homepage-embed #can_embed_form span.can_select {
    line-height: calc(var(--input-height) - 2px);
    padding-right: 30px;
  }
  .an-homepage-embed #can_embed_form textarea {
    border: 1px solid var(--input-border);
    background-color: var(--input-bg);
    border-radius: var(--input-radius);
    padding: 13px;
    box-sizing: border-box;
  }
  .an-homepage-embed #can_embed_form input[type="text"]:focus,
  .an-homepage-embed #can_embed_form input[type="password"]:focus,
  .an-homepage-embed #can_embed_form input[type="url"]:focus,
  .an-homepage-embed #can_embed_form input[type="email"]:focus,
  .an-homepage-embed #can_embed_form input[type="tel"]:focus,
  .an-homepage-embed #can_embed_form input[type="number"]:focus,
  .an-homepage-embed #can_embed_form textarea:focus { border-color: var(--input-focus); }

  .an-homepage-embed #can_embed_form input::placeholder,
  .an-homepage-embed #can_embed_form textarea::placeholder { color: var(--placeholder); opacity: 1; }

  .an-homepage-embed #can_embed_form .can_form .section_header,
  .an-homepage-embed #can_embed_form #email_wrap,
  .an-homepage-embed #can_embed_form #phone_wrap {
    border-top: 1px solid var(--divider);
    padding-top: 12px;
  }
  .an-homepage-embed #can_embed_form .can_field_description,
  .an-homepage-embed #can_embed_form .form_caption,
  .an-homepage-embed #can_embed_form .disclaimer {
    font-size: 12px; line-height: 18px; color: var(--text);
  }

  /* 9. SUBMIT BUTTON */
  .an-homepage-embed #can_embed_form input[type="submit"],
  .an-homepage-embed #can_embed_form .button,
  .an-homepage-embed #donate_auto_modal input[type="submit"],
  .an-homepage-embed #donate_auto_modal .button {
    background-color: var(--brand);
    color: #fff;
    border-radius: var(--button-radius);
    font-size: 20px; font-weight: 700;
    text-transform: var(--button-transform);
    letter-spacing: .6px;
    padding: 16px 20px;
    line-height: 1.2;
  }
  .an-homepage-embed #can_embed_form input[type="submit"]:hover,
  .an-homepage-embed #can_embed_form .button:hover,
  .an-homepage-embed #donate_auto_modal input[type="submit"]:hover,
  .an-homepage-embed #donate_auto_modal .button:hover { background-color: var(--brand-hover); color: #fff; }

  /* 10. LINKS */
  .an-homepage-embed a { color: var(--link); text-decoration: none; }
  .an-homepage-embed a:hover { color: var(--link); opacity: var(--hover-opacity); text-decoration: underline; }

  /* 11. PROGRESS BAR */
  .an-homepage-embed .action_status_tracker { text-align: center; margin-bottom: 12px; }
  .an-homepage-embed .action_status_running_total {
    font-family: var(--font-heading); font-size: 1em; font-weight: 700 !important;
    color: var(--brand) !important; margin-bottom: 6px;
  }
  .an-homepage-embed .action_status_status_bar {
    display: block; width: 100%; height: 10px; border-radius: 5px;
    background: #e0e0e0; overflow: hidden; margin: 0 0 6px;
  }
  .an-homepage-embed #can_embed_form .action-widget--toggle .action_status_status_bar span.action_status_status_bar-grow {
    background: var(--brand) !important;
  }
  .an-homepage-embed .action_status_goal { font-size: 0.8em; color: #888; margin-bottom: 12px; }
  .an-homepage-embed #can_embed_form_inner.survey_int #survey_questions_footer button {
    height: auto !important; padding-top: 12px !important; padding-bottom: 12px !important;
  }

  /* 12. TWO-COLUMN LAYOUT */
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix,
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix,
  .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form > .clearfix {
    align-items: flex-start; display: flex; flex-flow: row wrap; gap: 64px;
  }
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix .can_thank_you-block,
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix .can_thank_you-block,
  .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form > .clearfix .can_thank_you-block,
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form.can_768 > .clearfix .can_thank_you-block,
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form.can_768 > .clearfix .can_thank_you-block,
  .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form.can_768 > .clearfix .can_thank_you-block,
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix .can_thank_you-block #referral_code_select_wrap,
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix .can_thank_you-block #referral_code_select_wrap,
  .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form > .clearfix .can_thank_you-block #referral_code_select_wrap { width: 100%; }
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_main_col #action_info .action_owner_box {
    float: none; margin-right: 0; width: 100%;
  }
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix #can_main_col,
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_main_col { width: 100%; margin-bottom: 0; }
  .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form > .clearfix #can_sidebar { margin-left: auto; }

  @media (min-width: 768px) {
    .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix,
    .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix,
    .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form > .clearfix { flex-flow: row nowrap; }
    .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form.can_thank_you_wrap > .clearfix,
    .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form.can_thank_you_wrap > .clearfix,
    .an-homepage-embed .gen_wrapper.layout--full   #can_embed_form.can_thank_you_wrap > .clearfix { flex-flow: row wrap; }
    .an-homepage-embed .gen_wrapper.layout--equal #can_embed_form > .clearfix #can_main_col { width: 56%; margin-bottom: 0; }
    .an-homepage-embed .gen_wrapper.layout--equal #can_embed_form > .clearfix #can_sidebar { width: 40%; }
    .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_main_col { width: 30%; margin-bottom: 0; }
    .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_sidebar { width: 65%; }
    .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_letter_one_col #can_sidebar,
    .an-homepage-embed .gen_wrapper.layout--reverse #can_embed_form > .clearfix #can_letter_one_col #can_main_col,
    .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix #can_letter_one_col #can_sidebar,
    .an-homepage-embed .gen_wrapper.layout--equal  #can_embed_form > .clearfix #can_letter_one_col #can_main_col { width: 100%; }
  }

  .an-homepage-embed .gen_wrapper.layout--full #can_embed_form > .clearfix { flex-flow: row wrap; }
  .an-homepage-embed .gen_wrapper.layout--full #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--full #can_embed_form > .clearfix #can_main_col { width: 100%; margin-bottom: 0; }

  .an-homepage-embed .gen_wrapper.layout--reverse .event_campaign #can_embed_form > .clearfix,
  .an-homepage-embed .gen_wrapper.layout--full   .event_campaign #can_embed_form > .clearfix,
  .an-homepage-embed .gen_wrapper.layout--equal  .event_campaign #can_embed_form > .clearfix { flex-flow: row wrap; }
  .an-homepage-embed .gen_wrapper.layout--reverse .event_campaign #can_embed_form > .clearfix .entry-title,
  .an-homepage-embed .gen_wrapper.layout--full   .event_campaign #can_embed_form > .clearfix .entry-title,
  .an-homepage-embed .gen_wrapper.layout--equal  .event_campaign #can_embed_form > .clearfix .entry-title { width: 100%; }
  .an-homepage-embed .gen_wrapper.layout--reverse .event_campaign #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--full   .event_campaign #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .gen_wrapper.layout--equal  .event_campaign #can_embed_form > .clearfix #can_sidebar { order: 2; }

  /* Host-site embed context (.can_embed) */
  .an-homepage-embed .can_embed #can_embed_form > .clearfix,
  .an-homepage-embed .can_embed #can_embed_form > div > .clearfix {
    align-items: flex-start; display: flex; flex-flow: row wrap; gap: 64px;
  }
  .an-homepage-embed .can_embed #can_embed_form > .clearfix #can_sidebar,
  .an-homepage-embed .can_embed #can_embed_form > div > .clearfix #can_sidebar { margin-left: auto; width: 100%; }
  .an-homepage-embed .can_embed #can_embed_form > .clearfix #can_main_col,
  .an-homepage-embed .can_embed #can_embed_form > div > .clearfix #can_main_col { width: 100%; margin-bottom: 0; }
  @media (min-width: 768px) {
    .an-homepage-embed .can_embed #can_embed_form > .clearfix,
    .an-homepage-embed .can_embed #can_embed_form > div > .clearfix { flex-flow: row nowrap; }
    .an-homepage-embed .can_embed #can_embed_form > .clearfix #can_sidebar,

  }

  /* Basic embed wrapper (no layout-- / no can_embed) */
  .an-homepage-embed .gen_wrapper #can_embed_form > .clearfix {
    align-items: flex-start; display: flex; flex-flow: row wrap; gap: 64px;
  }
  .an-homepage-embed .gen_wrapper #can_embed_form > .clearfix #can_sidebar { margin-left: auto; width: 100%; }
  .an-homepage-embed .gen_wrapper #can_embed_form > .clearfix #can_main_col { width: 100%; margin-bottom: 0; }

  <script>
    /* =====================================================================
       CONFIG: MODULES — per-client toggles. This is the bit you change.

    window.ANW = {

         true  = monthly is pre-selected (donor can still untick)
         false = leave AN's default (one-off)

         some orgs / payment processors — enable only with the client's sign-off. */
      recurringPretick: false,

      /* Hide the description sidebar on fundraiser pages so the donation form
         goes full width. Relies on the iframe injector below. */
      hideFundraiserSidebar: false,

      /* Hide AN's "sponsored by" / "petition by" attribution line.
         true  = hidden (default — the an-hide-sponsor body class is on by default)
         false = show who the action is by. */
      hideSponsoredBy: true,

      /* Font stylesheet URL also loaded inside the fundraiser iframe so the
         donation form uses the brand font. Keep in sync with the <link> above. */
      fontUrl: "https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700&display=swap",

      /* Share buttons on the thank-you page.
         shareButtons   — master on/off for the whole widget.
         shareLabel     — the prompt line shown above the buttons.
         sharePlatforms — turn individual networks on/off. */
      shareButtons: true,
      shareLabel: "Share this with your network",
      sharePlatforms: {
        whatsapp: true,
        facebook: true,
        x:        false,
        bluesky:  false,
        linkedin: false,
        copy:     true
      }
    };

    /* Sponsored-by: hidden by default via the an-hide-sponsor body class.
       Only act when the client has opted to SHOW it. */
    document.addEventListener('DOMContentLoaded', function () {
      if (window.ANW && window.ANW.hideSponsoredBy === false) {
        document.body.classList.remove('an-hide-sponsor');
      }
    });
  </script>

  <script>
    /* Inject our inline styles (and the brand font) into the fundraiser iframe
       (same-origin) and tag its <body> so scoped rules apply. The donation
       widget renders in an iframe whose document is replaced once the widget
       loads, so we re-inject on its 'load' event. Reads the inline
       <style id="anw-embed-css"> textContent — single source, no URL. */
    (function () {
      'use strict';
      var styleEl = document.getElementById('anw-embed-css');
      var CSS_TEXT = styleEl ? styleEl.textContent : '';

      /* Inject into one iframe's document. Idempotent: if our <style> is already
         present it just re-asserts the body classes and returns. Returns true
         once the doc is reachable and styled. AN replaces the iframe document
         after its widget JS runs, which removes our <style> — so when that
         happens getElementById() misses and we re-inject. */
      function injectIntoIframe(iframe) {
        try {
          var doc = iframe.contentDocument || iframe.contentWindow.document;
          if (!doc || !doc.head || !doc.body) return false;
          doc.body.classList.add('an-homepage-embed');
          if (window.ANW.hideFundraiserSidebar) doc.body.classList.add('an-hide-sidebar');
          if (window.ANW.hideSponsoredBy !== false) doc.body.classList.add('an-hide-sponsor');
          if (doc.getElementById('anw-iframe-styles')) return true;
          if (window.ANW.fontUrl) {
            var fl = doc.createElement('link');
            fl.rel = 'stylesheet'; fl.href = window.ANW.fontUrl;
            doc.head.appendChild(fl);
          }
          var s = doc.createElement('style');
          s.id = 'anw-iframe-styles';
          s.type = 'text/css';
          s.appendChild(doc.createTextNode(CSS_TEXT));
          doc.head.appendChild(s);
          return true;
        } catch (e) { return false; }   /* not ready yet, or transiently cross-origin */
      }

      /* Sweep EVERY same-origin iframe on the page. The donation widget uses
         iframe#can_embed_iframe, but ticketed-event payment widgets use a
         different id — scanning all iframes covers both without hard-coding. */
      function sweep() {
        var frames = document.querySelectorAll('iframe');
        for (var i = 0; i < frames.length; i++) {
          var f = frames[i];
          injectIntoIframe(f);
          if (!f._anwBound) {
            f._anwBound = true;
            f.addEventListener('load', function () { injectIntoIframe(this); });
          }
        }
      }

      /* Poll for ~30s. Cheap, and the only reliable way to re-style after AN
         swaps the iframe document without firing a 'load' we can catch in time. */
      sweep();
      var ticks = 0, MAX = 120;            // 120 × 250ms = 30s
      var timer = setInterval(function () {
        ticks++;
        sweep();
        if (ticks >= MAX) clearInterval(timer);
      }, 250);

      /* Also react immediately when an iframe is (re)added to the DOM. */
      var observer = new MutationObserver(sweep);
      observer.observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>

  <script>
    /* MODULE (gated): pre-tick "Make This Recurring Monthly" on fundraisers.
       Runs only when ANW.recurringPretick === true. The donation form lives in
       an iframe whose document is replaced once the widget loads, so we poll
       (re-reading contentDocument each tick). Ticks once via .click() so AN's
       own handlers run; the user can still untick. */
    (function () {
      'use strict';
      if (!(window.ANW && window.ANW.recurringPretick)) return;
      var tries = 0, MAX = 80; // ~24s at 300ms
      var timer = setInterval(function () {
        tries++;
        var iframe = document.querySelector('[id^="can-fundraising-area"] iframe, iframe#can_embed_iframe');
        if (iframe) {
          try {
            var doc = iframe.contentDocument || iframe.contentWindow.document;
            var cb = doc && doc.querySelector('input[name="donation[recurring]"]');
            if (cb) {
              clearInterval(timer);
              if (!cb._anwDone) { cb._anwDone = true; if (!cb.checked) cb.click(); }
              return;
            }
          } catch (e) { /* iframe not ready / cross-origin transient */ }
        }
        if (tries >= MAX) clearInterval(timer);
      }, 300);
    })();
  </script>

        copy:     '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'
      };
      var TEXT = {
        whatsapp: 'Share on WhatsApp', facebook: 'Share on Facebook',
        x: 'Share on X', bluesky: 'Share on Bluesky', linkedin: 'Share on LinkedIn',
        copy: 'Copy link'
      };
      var ORDER = ['whatsapp', 'facebook', 'x', 'bluesky', 'linkedin', 'copy'];
      var PLATS = (window.ANW && window.ANW.sharePlatforms) || { whatsapp: true, facebook: true };
      var LABEL = (window.ANW && window.ANW.shareLabel) || 'Share this with your network';

      /* encodeURIComponent escapes quotes/&/<> too, so the result is safe to drop

      function linkFor(net, title, href) {
        switch (net) {

          case 'x':        return 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(title) + '&url=' + encodeURIComponent(href);
          case 'bluesky':  return 'https://bsky.app/intent/compose?text=' + encodeURIComponent(title + ' ' + href);
          case 'linkedin': return 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(href);

      function build() {
        var href = window.location.href, title = document.title, html = '';
        ORDER.forEach(function (net) {
          if (!PLATS[net]) return;
          var inner = ICON[net] + '<span class="anw-btn-text">' + TEXT[net] + '</span>';
          if (net === 'copy') {
            html += '<button type="button" class="share-btn copy" data-net="copy">' + inner + '</button>';

            /* Real anchor + target="_blank" — browser opens a clean new tab. */
            html += '<a class="share-btn ' + net + '" target="_blank" rel="noopener noreferrer" href="' + linkFor(net, title, href) + '">' + inner + '</a>';

          e.stopPropagation();   /* keep the click out of AN's #can_embed_form handlers */
          if (btn.getAttribute('data-net') !== 'copy') return;   /* anchors: native new tab */

      function copyLink(text, btn) {
        function flash() {
          var t = btn.querySelector('.anw-btn-text'); if (!t) return;
          var prev = t.textContent; t.textContent = 'Copied!';
          setTimeout(function () { t.textContent = prev; }, 1600);

        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch (e) {}
          document.body.removeChild(ta); flash();
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(flash, fallback);
        } else { fallback(); }
      }

        var ty = document.getElementById('can_thank_you') ||
                 document.querySelector('#can_embed_form.can_thank_you_wrap');
        if (!ty) return false;
        if (ty.querySelector('.anw-share')) return true;   // already added
        var row = build();
        if (row) ty.appendChild(row);
        return true;
      }

      if (!place()) {
        var obs = new MutationObserver(function () { if (place()) obs.disconnect(); });
        obs.observe(document.documentElement, { childList: true, subtree: true });
      }
    })();
