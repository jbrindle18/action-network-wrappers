<!-- ============================================================
     Action Network Wrapper Generator — Webflow embed snippet
     Built by Solidarity Studio
     ============================================================

  HOW TO USE
  1. Host generator.html at a public URL. Webflow can't serve a raw
     .html file as a page, so put it somewhere that can:
       - GitHub Pages, Netlify, Cloudflare Pages, or your own server.
     Copy the resulting URL (must be https://).
  2. In Webflow, drop an "Embed" element (Add panel > Components >
     Embed / "HTML Embed") onto the page where you want the tool.
  3. Paste EVERYTHING below into that Embed element.
  4. The src is already set to your GitHub Pages URL:
     https://jbrindle18.github.io/action-network-wrappers/generator.html
  5. Publish. The iframe auto-grows to fit the tool as the user works.

  NOTES
  - allow="clipboard-write"  lets the Copy header / Copy footer buttons
    write to the clipboard from inside the iframe.
  - The tool also downloads files (Save wrapper) and reads files
    (Open saved wrapper); a normal (un-sandboxed) iframe like this one
    permits both. If you choose to add a sandbox attribute, you must
    include: allow-scripts allow-same-origin allow-downloads
    allow-popups allow-forms — or those features will break.
  - The 1200px height is just a starting value; the script below resizes
    the iframe to the tool's real height as soon as it reports in.
============================================================ -->

<iframe
  id="anwGen"
  src="https://jbrindle18.github.io/action-network-wrappers/generator.html"
  title="Action Network Wrapper Generator"
  style="width:100%;border:0;display:block;height:1200px;"
  allow="clipboard-write"
  loading="lazy"></iframe>

<script>
(function () {
  var frame = document.getElementById("anwGen");
  if (!frame) return;
  window.addEventListener("message", function (e) {
    /* Optional hardening: also check e.origin === "https://YOUR-HOSTED-URL" */
    var h = e && e.data && e.data.anwGenHeight;
    if (typeof h === "number" && h > 0) {
      frame.style.height = h + "px";
    }
  });
})();
</script>
